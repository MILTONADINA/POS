name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build, verify & coverage (JDK 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build, format check, tests, coverage gate
        run: mvn -B verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Upload runnable jar
        uses: actions/upload-artifact@v4
        with:
          name: point-of-sale-jar
          path: target/point-of-sale-*.jar

  compat:
    name: Compile & test (JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # The Google Java Format check is pinned to the JDK 17 job; here we just prove the
      # code compiles and the tests pass on a newer JDK.
      - name: Compile and test
        run: mvn -B -Dspotless.check.skip=true test
